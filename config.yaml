settings:
  # 三重过滤指标参数
  weekly_ema_period: 13       # 第一重：周线EMA周期
  macd_fast: 12               # MACD快线
  macd_slow: 26               # MACD慢线
  macd_signal: 9              # MACD信号线
  stoch_k: 14                 # 第二重：随机指标K周期
  stoch_d: 3                  # 随机指标D周期
  daily_ema_period: 22        # 第三重：日线EMA周期

  # 历史数据初始化范围
  history_period: "10y"

  # 报表设置
  report_title: "三重过滤交易信号"
  timezone: "America/New_York"   # 美东时间
  output_dir: "/Users/jay/workspace/my_github/infinityjay.github.io/trading"