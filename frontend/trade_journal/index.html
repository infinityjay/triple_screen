<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triple Screen Atlas</title>
  <meta http-equiv="refresh" content="0; url=/journal">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Manrope", "Noto Sans SC", sans-serif;
      background: linear-gradient(180deg, #f4efe3 0%, #f8f4eb 54%, #f1ebdc 100%);
      color: #162120;
    }
    main {
      width: min(560px, calc(100vw - 32px));
      padding: 32px;
      border-radius: 24px;
      border: 1px solid rgba(28, 48, 47, 0.12);
      background: rgba(255, 252, 246, 0.88);
      box-shadow: 0 26px 70px rgba(39, 36, 28, 0.12);
    }
    a {
      color: #27564f;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>正在进入 Triple Screen Atlas</h1>
    <p>如果没有自动跳转，请打开 <a href="/journal">交易日志</a>、<a href="/watchlist">观察列表</a> 或 <a href="/analysis">技术分析</a>。</p>
  </main>
</body>
</html>
