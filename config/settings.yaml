app:
  name: "Triple Screen Scanner"
  timezone: "America/New_York"

server:
  host: "0.0.0.0"
  port: 8100

data_source:
  alpaca:
    market_data_base_url: "https://data.alpaca.markets/v2"
    trading_base_url: "https://paper-api.alpaca.markets/v2"
    api_key_id_env: "ALPACA_API_KEY_ID"
    api_secret_key_env: "ALPACA_API_SECRET_KEY"
    timeout_seconds: 15
    retry_attempts: 3
    retry_sleep_seconds: 5
    rate_limit_sleep_seconds: 60
    adjustment: "split"
    feed: "iex"
    history:
      weekly_weeks: 60
      daily_days: 90
      hourly_hours: 160
    rate_limit:
      max_requests_per_minute: 180
    cache:
      enabled: true
      overlap_bars: 3
  earnings_calendar:
    enabled: true
    provider: "alphavantage"
    base_url: "https://www.alphavantage.co/query"
    api_key_env: "ALPHAVANTAGE_API_KEY"
    horizon: "3month"
    timeout_seconds: 20

universe:
  mode: "static_file"
  top_n: 150
  static_file: "config/universe_sp500_top150.yaml"
  custom_symbols: []
  allowed_ticker_types:
    - "CS"
  exclude_symbols_containing:
    - "."

trading_model:
  active: "elder_force"

strategy:
  weekly:
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    confirm_bars: 2
    require_impulse_alignment: true
  daily:
    rsi_period: 14
    rsi_oversold: 35
    rsi_overbought: 65
    recovery_mode: true
    value_band_atr_multiplier: 0.75
  hourly:
    trigger_mode: "trailing_bar"
    atr_period: 14
  qualification:
    minimum_reward_risk: 0.0
    intraday_minimum_reward_risk: 1.2
    strong_divergence_exhaustion_multiplier: 2.0
    earnings_block_days_before: 3
    earnings_block_days_after: 1
    earnings_warn_days_before: 5

trade_plan:
  safezone_lookback: 10
  safezone_ema_period: 22
  safezone_long_coefficient: 2.0
  safezone_short_coefficient: 3.0
  thermometer_period: 22
  thermometer_target_multiplier: 1.0

alerts:
  cooldown_hours: 6
  qualified_display_limit: 15
  telegram:
    enabled: true
    bot_token_env: "TELEGRAM_BOT_TOKEN"
    chat_id_env: "TELEGRAM_CHAT_ID"

market_filter:
  enabled: true
  benchmark_symbol: "SPY"

runtime:
  scan_interval_minutes: 60
  max_workers: 1
  log_level: "INFO"
  log_file: "logs/scanner.log"

storage:
  database_path: "data/triple_screen.db"
