app:
  name: "Triple Screen Scanner"
  timezone: "America/New_York"

data_source:
  polygon:
    base_url: "https://api.polygon.io"
    api_key_env: "POLYGON_API_KEY"
    timeout_seconds: 15
    retry_attempts: 3
    retry_sleep_seconds: 5
    rate_limit_sleep_seconds: 60
    adjusted: true
    history:
      weekly_weeks: 60
      daily_days: 90
      hourly_hours: 160
    rate_limit:
      max_requests_per_minute: 4
    cache:
      enabled: true
      overlap_bars: 3

universe:
  mode: "static_file"
  top_n: 300
  static_file: "config/universe_us_top300.yaml"
  custom_symbols: []
  allowed_ticker_types:
    - "CS"
  exclude_symbols_containing:
    - "."

strategy:
  weekly:
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    confirm_bars: 2
  daily:
    rsi_period: 14
    rsi_oversold: 35
    rsi_overbought: 65
    recovery_mode: true
  hourly:
    breakout_bars: 6
    atr_period: 14

risk:
  account_size: 100000
  account_risk_pct: 0.01
  atr_multiplier: 1.5
  reward_risk_ratio: 2.0
  max_hold_bars: 72

alerts:
  cooldown_hours: 6
  max_signals_per_scan: 10
  telegram:
    enabled: true
    bot_token_env: "TELEGRAM_BOT_TOKEN"
    chat_id_env: "TELEGRAM_CHAT_ID"

market_filter:
  enabled: true
  benchmark_symbol: "SPY"

runtime:
  scan_interval_minutes: 60
  max_workers: 1
  log_level: "INFO"
  log_file: "logs/scanner.log"

storage:
  database_path: "data/triple_screen.db"
